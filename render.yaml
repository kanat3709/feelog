services:
  - type: web
    name: feelog
    runtime: ruby
    buildCommand: bundle install && bundle exec rails assets:precompile && bundle exec rails assets:clean && RAILS_ENV=production bundle exec rails db:migrate && RAILS_ENV=production bundle exec rails db:seed
    startCommand: bundle exec puma -C config/puma.rb
    envVars:
      - key: RAILS_MASTER_KEY
        sync: false