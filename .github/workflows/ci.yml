name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v6

      - name: Rubyのセットアップ
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Brakemanでセキュリティ脆弱性をスキャン
        run: bin/brakeman --no-pager

      - name: bundler-auditでgemの脆弱性をスキャン
        run: bin/bundler-audit

  lint:
    runs-on: ubuntu-latest
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v6

      - name: Rubyのセットアップ
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: RuboCopキャッシュの準備
        uses: actions/cache@v4
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('.ruby-version', '**/.rubocop.yml', '**/.rubocop_todo.yml', 'Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: RuboCopでコードスタイルをチェック
        run: bin/rubocop -f github

  rspec:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: feelog_test
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: パッケージのインストール
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y libpq-dev libvips

      - name: コードをチェックアウト
        uses: actions/checkout@v6

      - name: Rubyのセットアップ
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: RSpecを実行
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/feelog_test
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
        run: |
          bundle exec rails db:create
          bundle exec rails db:schema:load
          bundle exec rspec